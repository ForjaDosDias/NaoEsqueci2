name: deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-naoesqueci
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy
    runs-on: [self-hosted, vps-prod]
    env:
      # Código-fonte (git pull aqui) e diretório do compose (build/up aqui) são separados no NaoEsqueci.
      SRC_DIR: /home/victor/Projetos/Publicado/NaoEsqueci
      COMPOSE_DIR: /home/victor/Projetos/vps-infra/naoesqueci
      REPO: ForjaDosDias/NaoEsqueci2
      CONTAINER: naoesqueci
    steps:
      - name: Atualizar código de produção
        run: |
          cd "$SRC_DIR"
          git fetch "https://x-access-token:${{ github.token }}@github.com/${REPO}.git" main
          git reset --hard FETCH_HEAD

      - name: Rebuild e subir container (aguarda ficar healthy)
        run: |
          cd "$COMPOSE_DIR"
          docker compose up -d --build --wait --wait-timeout 180

      - name: Logs em caso de falha
        if: failure()
        run: |
          cd "$COMPOSE_DIR"
          docker compose logs --tail=80 "$CONTAINER" || true
